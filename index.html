<!DOCTYPE html>
<html>
<head>
    <title>Cadastro</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(120deg, #4facfe, #00f2fe);
            color: #333;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }
        button {
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
        }
        table {
            width: 100%;
            margin-top: 20px;
        }
        td {
            padding: 8px;
        }
        a {
            text-decoration: none;
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastro de Contatos</h2>

    <form action="/add" method="post">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="email" name="email" placeholder="E-mail" required>
        <input type="text" name="celular" placeholder="Celular" required>
        <button type="submit">Cadastrar</button>
    </form>

    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Celular</th>
            <th>Ações</th>
        </tr>

        {% for d in dados %}
        <tr>
            <td>{{ d.nome }}</td>
            <td>{{ d.email }}</td>
            <td>{{ d.celular }}</td>
            <td>
                <a href="/edit/{{ d.id }}">Editar</a> |
                <a href="/delete/{{ d.id }}">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
