<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estoque Inova - Painel</title>
    <style>
        /* Estilos atualizados para um visual mais profissional e moderno */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            padding: 40px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 900px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        /* Grid para deixar o formulário mais organizado (lado a lado) */
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #f9f9fc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button[type="submit"] {
            grid-column: span 2;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button[type="submit"]:hover {
            background-color: #004494;
        }
        /* Estilização da tabela de estoque */
        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #0056b3;
            color: white;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        /* Estilização dos links de ação (Editar/Excluir) */
        .acoes a {
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-right: 5px;
        }
        .btn-edit {
            background-color: #ffc107;
            color: #333;
        }
        .btn-edit:hover { background-color: #e0a800; }
        
        .btn-delete {
            background-color: #dc3545;
            color: white;
        }
        .btn-delete:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gestão de Estoque - Inova Peças</h2>

    <!-- O formulário envia os dados correspondentes à tabela estoque_inova -->
    <form action="/add" method="post">
        <!-- Como o seu ID numérico não é automático, deixei um campo para ele -->
        <input type="number" name="id" placeholder="ID da Peça (Ex: 11)" required>
        <input type="text" name="sku" placeholder="SKU (Ex: POU-01)" required>
        <input type="text" name="nome" placeholder="Nome / Descrição" required>
        <input type="number" name="quantidade" placeholder="Quantidade" required>
        <input type="number" step="0.01" name="preco" placeholder="Preço Unitário (R$)" required>
        
        <button type="submit">Cadastrar Nova Peça</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>SKU</th>
                <th>Nome</th>
                <th>Qtd.</th>
                <th>Preço (R$)</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <!-- O laço de repetição Jinja buscando as variáveis exatas do banco -->
            {% for d in dados %}
            <tr>
                <td>{{ d.Id }}</td>
                <td>{{ d.SKU }}</td>
                <td>{{ d.Nome }}</td>
                <td>{{ d.Quantidade }}</td>
                <td>{{ d.Preco }}</td>
                <td class="acoes">
                    <a href="/edit/{{ d.Id }}" class="btn-edit">Editar</a>
                    <a href="/delete/{{ d.Id }}" class="btn-delete" onclick="return confirm('Tem certeza que deseja excluir esta peça?')">Excluir</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
